    <meta name="theme-color" content="#050505">
    <style>
        @font-face {
            font-family: 'Nistha';
            src: url('fonts/nistha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'AnekKannada';
            src: url('fonts/anek-kannada.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Akasha';
            src: url('fonts/akasha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        html, body { overscroll-behavior: none; overscroll-behavior-x: none; touch-action: pan-y; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: #050505; overflow: hidden; }
        .scroll-container { height: 400vh; position: relative; }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .scroll-hint.hidden { opacity: 0; pointer-events: none; }
        .scroll-hint .hint-text {
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
            font-weight: 100;
            font-size: 16px;
            letter-spacing: 3px;
            color: rgba(210, 160, 120, 0.8);
            animation: pulse-down 2s ease-in-out infinite;
        }
        .scroll-hint svg {
            width: 28px;
            height: 28px;
            animation: pulse-down 2s ease-in-out infinite;
        }
        .scroll-hint svg path {
            fill: none;
            stroke: rgba(210, 160, 120, 0.5);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        @keyframes pulse-down {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(6px); }
        }
        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(30, 25, 20, 0.7);
            border: 1px solid rgba(210, 160, 120, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .mute-btn.visible { opacity: 1; }
        .mute-btn svg { width: 20px; height: 20px; }
        .mute-btn path { fill: rgba(210, 160, 120, 0.7); }
        .watermark {
            position: fixed;
            top: calc(50% - clamp(80px, 14vh, 140px));
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-family: Nistha, Georgia, serif;
            font-size: clamp(28px, 6vw, 52px);
            letter-spacing: 2px;
            color: rgba(210, 160, 120, 0.25);
            pointer-events: none;
            white-space: nowrap;
        }
        .watermark.hidden { opacity: 0; }
    </style>
</head>
<body>
    <div id="startOverlay" style="position:fixed;inset:0;z-index:10000;background:rgba(5,5,5,0.97);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;-webkit-tap-highlight-color:transparent;">
        <div style="font-family:Nistha,Georgia,serif;font-size:clamp(28px,6vw,52px);color:rgba(210,160,120,0.85);margin-bottom:clamp(30px,6vh,60px);letter-spacing:2px;">Cosmic Resonance</div>
        <div id="breathCircle" style="width:clamp(80px,18vw,120px);height:clamp(80px,18vw,120px);border-radius:50%;border:1.5px solid rgba(210,160,120,0.3);display:flex;align-items:center;justify-content:center;animation:breathe 3s ease-in-out infinite;position:relative;">
            <div style="position:absolute;inset:0;border-radius:50;background:radial-gradient(circle,rgba(255,200,100,0.06) 0%,rgba(255,180,80,0.02) 50%,transparent 70%);"></div>
            <div class="orbit-core core-a"></div>
            <div class="orbit-core core-b"></div>
            <span id="awakenText" style="font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;font-size:clamp(14px,2.5vw,18px);font-weight:200;color:rgba(210,160,120,0.4);letter-spacing:3px;animation:awakenPulse 3s ease-in-out infinite;">awaken</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:clamp(30px,6vh,60px);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(210,160,120,0.45)" stroke-width="1.5" stroke-linecap="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3v5zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3v5z"/></svg>
            <span style="font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;font-size:clamp(12px,2.2vw,15px);font-weight:200;color:rgba(210,160,120,0.4);letter-spacing:1px;">recommended</span>
        </div>
        <style>
            .orbit-core {
                position: absolute;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(255, 220, 150, 0.9), rgba(255, 180, 100, 0.3));
                box-shadow: 0 0 6px rgba(255, 200, 120, 0.6);
                top: 50%;
                left: 50%;
                margin: -2.5px;
            }
            .core-a { animation: orbit 5s linear infinite; }
            .core-b { animation: orbit 5s linear infinite; animation-delay: -2.5s; }
            @keyframes orbit {
                from { transform: rotate(0deg) translateX(clamp(40px, 9vw, 60px)); }
                to { transform: rotate(360deg) translateX(clamp(40px, 9vw, 60px)); }
            }
            @keyframes breathe {
                0%, 100% { transform: scale(1); border-color: rgba(210,160,120,0.2); box-shadow: 0 0 15px rgba(255,200,120,0.05), 0 0 30px rgba(255,180,80,0.02); }
                50% { transform: scale(1.08); border-color: rgba(255,200,100,0.5); box-shadow: 0 0 25px rgba(255,200,120,0.15), 0 0 50px rgba(255,180,80,0.08); }
            }
            @keyframes awakenPulse {
                0%, 100% { color: rgba(210,160,120,0.35); }
                50% { color: rgba(255,220,160,0.8); }
            }
            @keyframes tapPulse {
                0% { transform: scale(1); border-color: rgba(255,250,200,1); box-shadow: 0 0 40px rgba(255,220,120,0.8), 0 0 80px rgba(255,180,80,0.4), inset 0 0 20px rgba(255,230,150,0.3); }
                40% { transform: scale(1.15); border-color: rgba(255,240,180,1); box-shadow: 0 0 60px rgba(255,200,100,0.9), 0 0 120px rgba(255,180,80,0.5), inset 0 0 40px rgba(255,220,140,0.4); }
                100% { transform: scale(6); border-color: rgba(255,230,160,0.6); box-shadow: 0 0 80px rgba(255,200,100,0.3); opacity: 0; }
            }
            @keyframes tapTextFlash {
                0% { color: rgba(255,250,220,1); text-shadow: 0 0 16px rgba(255,200,100,1); opacity: 1; }
                30% { color: rgba(255,255,240,1); text-shadow: 0 0 20px rgba(255,220,120,1); opacity: 1; }
                100% { opacity: 0; }
            }
            #startOverlay.dismiss {
                transition: opacity 1.2s ease-out 0.3s;
                opacity: 0;
            }
            #startOverlay.dismiss #breathCircle {
                animation: tapPulse 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            #startOverlay.dismiss .orbit-core {
                transition: opacity 0.2s;
                opacity: 0;
            }
            #startOverlay.dismiss #awakenText {
                animation: tapTextFlash 0.5s ease-out forwards;
            }
        </style>
    </div>

    <div class="scroll-container"></div>
    <canvas id="tanpura"></canvas>
    <div id="debugHud" style="position:fixed;bottom:8px;left:8px;z-index:100;font:12px/1.4 monospace;color:#6cf;background:rgba(0,0,0,0.85);padding:4px 10px;border-radius:4px;pointer-events:auto;-webkit-user-select:text;user-select:text;max-width:90vw;word-break:break-all;display:none;"></div>
    <div class="watermark" style="opacity:0">Cosmic Resonance</div>
    <div class="scroll-hint">
        <span class="hint-text">A name awaits</span>
        <svg viewBox="0 0 24 24"><path d="M12 4 L12 18 M6 13 L12 19 L18 13"/></svg>
    </div>
    <button class="mute-btn" id="muteBtn">
        <svg viewBox="0 0 24 24" id="muteIcon">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </button>

    <script src="js/main.js"></script>
</body>
