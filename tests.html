<script>
const results = [];
function assert(condition, msg) {
    results.push({ pass: !!condition, msg });
}

function assertClose(a, b, msg, tol = 0.0001) {
    results.push({ pass: Math.abs(a - b) < tol, msg: `${msg} (got ${a}, expected ${b})` });
}
function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
function smoothstep(a, b, t) { const x = Math.max(0, Math.min(1, (t-a)/(b-a))); return x*x*(3-2*x); }

// --- Bug #1: Negative radius crash (P0 fix) ---
// Particles with life <= 0 must never reach drawing code
function particleSizeIsDrawable(life, pSize, DPR) {
    const size = pSize * DPR * life;
    return size > 0;
}

assert(!particleSizeIsDrawable(-0.01, 2, 2), 'Negative life → size guard blocks drawing');
assert(!particleSizeIsDrawable(0, 1.5, 2), 'Zero life → size guard blocks drawing');
assert(particleSizeIsDrawable(0.001, 2, 2), 'Tiny positive life → still drawable');
assert(particleSizeIsDrawable(1.0, 2.5, 2), 'Full life → drawable');

// --- Bug #1b: Orb absorption must remove before draw, not decrement ---
function shouldAbsorbAtOrb(dist, orbRadius) {
    return dist < orbRadius * 0.6;
}
assert(shouldAbsorbAtOrb(10, 100), 'Close particle absorbed (dist=10, orb=100)');
assert(!shouldAbsorbAtOrb(70, 100), 'Far particle NOT absorbed (dist=70)');
assert(shouldAbsorbAtOrb(0, 50), 'Zero distance always absorbed');
assert(shouldAbsorbAtOrb(29, 50), 'dist=29 < 50*0.6=30 → absorbed');
assert(!shouldAbsorbAtOrb(31, 50), 'dist=31 > 50*0.6=30 → not absorbed');

// --- Speed cap: prevents runaway velocity ---
function capSpeed(vx, vy, maxSpeed) {
    const speed = Math.sqrt(vx * vx + vy * vy);
    if (speed > maxSpeed) {
        return { vx: (vx / speed) * maxSpeed, vy: (vy / speed) * maxSpeed };
    }
    return { vx, vy };
}
const c1 = capSpeed(100, 0, 16);
assert(Math.abs(c1.vx - 16) < 0.001, 'Horizontal over-speed capped to 16');
const c2 = capSpeed(0, -200, 16);
assert(Math.abs(c2.vy + 16) < 0.001, 'Vertical over-speed capped (preserves sign)');
const c3 = capSpeed(3, 4, 16);
assert(c3.vx === 3 && c3.vy === 4, 'Under-speed unchanged (magnitude=5 < 16)');

// --- Letter formation: index clamping prevents array OOB ---
function getActiveLetterIndex(elapsed, letterDuration) {
    return Math.min(4, Math.floor(elapsed / letterDuration));
}
assert(getActiveLetterIndex(0, 1.5) === 0, 'elapsed=0 → index 0 (R)');
assert(getActiveLetterIndex(1.49, 1.5) === 0, 'Just before boundary → still 0');
assert(getActiveLetterIndex(1.5, 1.5) === 1, 'Exactly at boundary → index 1');
assert(getActiveLetterIndex(7.4, 1.5) === 4, 'Near end → index 4 (last letter)');
assert(getActiveLetterIndex(999, 1.5) === 4, 'Overflow clamped to 4');
assert(getActiveLetterIndex(-1, 1.5) <= 0, 'Negative elapsed → index ≤ 0 (no OOB on right)');

// --- Font cycling: index wraps correctly ---
function getFontSegIndex(cycleElapsed, holdDuration, transitionDuration, fontCount) {
    const segmentDuration = holdDuration + transitionDuration;
    const totalCycle = segmentDuration * fontCount;
    const cycleT = cycleElapsed % totalCycle;
    return Math.floor(cycleT / segmentDuration);
}
assert(getFontSegIndex(0, 10, 0.8, 3) === 0, 'Start of cycle → font 0');
assert(getFontSegIndex(10.5, 10, 0.8, 3) === 0, 'Mid-transition of font 0 → still seg 0');
assert(getFontSegIndex(10.8, 10, 0.8, 3) === 1, 'After transition → font 1');
assert(getFontSegIndex(21.6, 10, 0.8, 3) === 2, 'Third segment → font 2');
assert(getFontSegIndex(32.5, 10, 0.8, 3) === 0, 'Past full cycle wraps → font 0');

// --- Reveal start/reset: scroll-up resets cycle ---
function simulateRevealReset(progressSequence) {
    let startTime = -1;
    const log = [];
    progressSequence.forEach(([progress, time]) => {
        if (progress <= 0) startTime = -1;
        if (progress > 0 && startTime < 0) startTime = time;
        log.push(startTime);
    });
    return log;
}
const resetLog = simulateRevealReset([[0.9, 10], [0.95, 11], [0, 12], [0.85, 15]]);
assert(resetLog[0] === 10, 'First reveal sets start=10');
assert(resetLog[1] === 10, 'Continued reveal keeps start=10');
assert(resetLog[2] === -1, 'Scroll up resets to -1');
assert(resetLog[3] === 15, 'Re-entering reveal sets new start=15');

// --- Smoothstep boundary correctness ---
assert(smoothstep(0.3, 0.7, 0.3) === 0, 'smoothstep at lower bound = 0');
assert(smoothstep(0.3, 0.7, 0.7) === 1, 'smoothstep at upper bound = 1');
assert(smoothstep(0.3, 0.7, 0.1) === 0, 'smoothstep below range clamped to 0');
assert(smoothstep(0.3, 0.7, 0.9) === 1, 'smoothstep above range clamped to 1');
assertClose(smoothstep(0.3, 0.7, 0.5), 0.5, 'smoothstep midpoint ≈ 0.5');

// --- Object pool: spawn/recycle/aliveCount ---
function createTestPool(poolSize, maxParticles) {
    const pool = [];
    let aliveCount = 0;
    for (let i = 0; i < poolSize; i++) {
        pool.push({ alive: false, life: 0 });
    }

    function spawn() {
        if (aliveCount >= maxParticles) {
            for (let i = 0; i < poolSize; i++) {
                if (pool[i].alive) { pool[i].alive = false; aliveCount--; break; }
            }
        }
        for (let i = 0; i < poolSize; i++) {
            if (!pool[i].alive) {
                pool[i].alive = true;
                pool[i].life = 1.0;
                aliveCount++;
                return true;
            }
        }
        return false;
    }

    function kill(idx) {
        if (pool[idx].alive) {
            pool[idx].alive = false;
            aliveCount = Math.max(0, aliveCount - 1);
        }
    }

    return { pool, spawn, kill, getAlive: () => aliveCount };
}

const tp1 = createTestPool(10, 5);
tp1.spawn(); tp1.spawn(); tp1.spawn();
assert(tp1.getAlive() === 3, 'Pool: 3 spawns → aliveCount = 3');
tp1.spawn(); tp1.spawn();
assert(tp1.getAlive() === 5, 'Pool: 5 spawns → aliveCount = 5 (at max)');
tp1.spawn();
assert(tp1.getAlive() === 5, 'Pool: spawn at max recycles oldest → still 5');
assert(tp1.pool[0].alive, 'Pool: slot 0 was recycled then immediately reused for new particle');
tp1.kill(1);
assert(tp1.getAlive() === 4, 'Pool: kill → aliveCount = 4');
tp1.kill(1);
assert(tp1.getAlive() === 4, 'Pool: double-kill same slot → no underflow (stays 4)');

// Edge case: kill all then spawn again
const tp2 = createTestPool(5, 3);
tp2.spawn(); tp2.spawn(); tp2.spawn();
tp2.kill(0); tp2.kill(1); tp2.kill(2);
assert(tp2.getAlive() === 0, 'Pool: all killed → 0');
tp2.spawn();
assert(tp2.getAlive() === 1, 'Pool: spawn after full kill → 1');

// --- aliveCount never goes negative ---
const tp3 = createTestPool(5, 3);
tp3.kill(0); tp3.kill(1); tp3.kill(2);
assert(tp3.getAlive() === 0, 'Pool: killing dead slots → aliveCount stays 0 (Math.max guard)');

// --- noteIdx bounds (modulo guard) ---
function safeNoteIdx(randValue, symbolCount) {
    return Math.floor(randValue * symbolCount) % symbolCount;
}
assert(safeNoteIdx(0, 5) === 0, 'noteIdx: rand=0 → 0');
assert(safeNoteIdx(0.99, 5) === 4, 'noteIdx: rand=0.99 → 4');
assert(safeNoteIdx(1.0, 5) === 0, 'noteIdx: rand=1.0 (edge) → 0 via modulo');

// --- drawSz floor check ---
function shouldDraw(size) {
    const noteSize = size * 5;
    const drawSz = noteSize * 2;
    return drawSz >= 2;
}
assert(!shouldDraw(0.1), 'drawSz: size=0.1 → drawSz=1 → skip');
assert(shouldDraw(0.5), 'drawSz: size=0.5 → drawSz=5 → draw');
assert(!shouldDraw(0), 'drawSz: size=0 → skip');

// --- Squared distance vs linear threshold equivalence ---
function absorbedSquared(dx, dy, radius, factor) {
    return (dx*dx + dy*dy) < (radius * radius * factor * factor);
}
function absorbedLinear(dx, dy, radius, factor) {
    return Math.sqrt(dx*dx + dy*dy) < radius * factor;
}
// These must agree
assert(absorbedSquared(3, 4, 100, 0.6) === absorbedLinear(3, 4, 100, 0.6), 'Squared check matches linear: inside');
assert(absorbedSquared(50, 50, 100, 0.6) === absorbedLinear(50, 50, 100, 0.6), 'Squared check matches linear: outside');
assert(absorbedSquared(0, 59, 100, 0.6) === absorbedLinear(0, 59, 100, 0.6), 'Squared check matches linear: boundary');

// --- getSpriteRow picks closest size index ---
function getSpriteRow(targetSize) {
    const SPRITE_SIZES = [10, 20, 36, 56];
    let best = 0;
    for (let i = 1; i < SPRITE_SIZES.length; i++) {
        if (Math.abs(SPRITE_SIZES[i] - targetSize) < Math.abs(SPRITE_SIZES[best] - targetSize)) best = i;
    }
    return best;
}
assert(getSpriteRow(8) === 0, 'spriteRow: target 8 → row 0 (size 10)');
assert(getSpriteRow(15) === 0, 'spriteRow: target 15 → row 0 (equidistant, keeps first match)');
assert(getSpriteRow(30) === 2, 'spriteRow: target 30 → row 2 (size 36)');
assert(getSpriteRow(50) === 3, 'spriteRow: target 50 → row 3 (size 56)');
assert(getSpriteRow(100) === 3, 'spriteRow: target 100 → capped at largest');

// --- Gradient cache: threshold-based invalidation ---
function shouldRecacheGradient(r, orbAlpha, breathe, lastR, lastAlpha, lastBreathe) {
    return Math.abs(r - lastR) > 1 || Math.abs(orbAlpha - lastAlpha) > 0.01 || Math.abs(breathe - lastBreathe) > 0.05;
}
assert(!shouldRecacheGradient(50, 0.5, 0.7, 50, 0.5, 0.7), 'No change → no recache');
assert(!shouldRecacheGradient(50.5, 0.505, 0.72, 50, 0.5, 0.7), 'Small change within threshold → no recache');
assert(shouldRecacheGradient(52, 0.5, 0.7, 50, 0.5, 0.7), 'R changed >1 → recache');
assert(shouldRecacheGradient(50, 0.52, 0.7, 50, 0.5, 0.7), 'Alpha changed >0.01 → recache');
assert(shouldRecacheGradient(50, 0.5, 0.76, 50, 0.5, 0.7), 'Breathe changed >0.05 → recache');

// --- Input system ---
function createTestInput() {
    const pointers = new Map();
    return {
        pointers,
        update(id, x, y) {
            const p = pointers.get(id);
            if (p) { p.prevX = p.x; p.prevY = p.y; p.x = x; p.y = y; }
            else pointers.set(id, { id, x, y, prevX: x, prevY: y });
        },
        remove(id) { pointers.delete(id); },
        clear() { pointers.clear(); }
    };
}

const inp = createTestInput();
inp.update('mouse', 100, 200);
assert(inp.pointers.size === 1, 'Input: first update creates pointer');
assert(inp.pointers.get('mouse').x === 100, 'Input: x stored correctly');
assert(inp.pointers.get('mouse').prevX === 100, 'Input: first update sets prevX = x');

inp.update('mouse', 150, 210);
assert(inp.pointers.get('mouse').prevX === 100, 'Input: second update saves prev');
assert(inp.pointers.get('mouse').x === 150, 'Input: second update sets new x');

inp.update(0, 50, 50);
inp.update(1, 200, 200);
assert(inp.pointers.size === 3, 'Input: multi-touch adds separate pointers');

inp.remove('mouse');
assert(inp.pointers.size === 2, 'Input: remove deletes specific pointer');
assert(!inp.pointers.has('mouse'), 'Input: removed pointer is gone');

inp.clear();
assert(inp.pointers.size === 0, 'Input: clear removes all');

// --- StringInteraction lock logic ---
function createTestLocks() {
    const locks = new Map();
    return {
        locks,
        getLockKey(pid, sidx) { return `${pid}-${sidx}`; },
        lock(pid, sidx) { locks.set(this.getLockKey(pid, sidx), true); },
        unlock(pid, sidx) { locks.delete(this.getLockKey(pid, sidx)); },
        isLocked(pid, sidx) { return locks.has(this.getLockKey(pid, sidx)); },
        clearForPointer(pid) {
            for (const key of [...locks.keys()]) {
                if (key.startsWith(`${pid}-`)) locks.delete(key);
            }
        }
    };
}

const lk = createTestLocks();
lk.lock('mouse', 0);
lk.lock('mouse', 1);
lk.lock(1, 0);
assert(lk.isLocked('mouse', 0), 'Lock: mouse-0 is locked');
assert(lk.isLocked('mouse', 1), 'Lock: mouse-1 is locked');
assert(lk.isLocked(1, 0), 'Lock: touch1-0 is locked');
assert(!lk.isLocked('mouse', 2), 'Lock: mouse-2 is NOT locked');

lk.unlock('mouse', 0);
assert(!lk.isLocked('mouse', 0), 'Lock: unlock removes specific lock');
assert(lk.isLocked('mouse', 1), 'Lock: other locks unaffected');

lk.clearForPointer('mouse');
assert(!lk.isLocked('mouse', 1), 'Lock: clearForPointer removes all for that pointer');
assert(lk.isLocked(1, 0), 'Lock: other pointer locks unaffected');

// --- Pluck decay ---
function simulatePluckDecay(initial, frames) {
    let offset = initial;
    for (let i = 0; i < frames; i++) {
        offset *= 0.92;
        if (Math.abs(offset) < 0.5) { offset = 0; break; }
    }
    return offset;
}
assert(simulatePluckDecay(40, 1) === 40 * 0.92, 'Pluck: one frame decay');
assert(simulatePluckDecay(40, 60) === 0, 'Pluck: fully decayed after many frames');
assert(simulatePluckDecay(0.4, 1) === 0, 'Pluck: below threshold snaps to 0');
assert(simulatePluckDecay(-30, 1) === -30 * 0.92, 'Pluck: negative offset decays toward 0');

// --- Pluck force capping ---
function capPluck(current, force, max) {
    let offset = current + force;
    return Math.max(-max, Math.min(max, offset));
}
assert(capPluck(0, 30, 60) === 30, 'PluckCap: normal add');
assert(capPluck(50, 20, 60) === 60, 'PluckCap: capped at max');
assert(capPluck(-50, -20, 60) === -60, 'PluckCap: capped at -max');
assert(capPluck(30, -50, 60) === -20, 'PluckCap: opposite direction subtracts');

// --- Swept collision: pointer crossing string detection ---
function crossedOver(prevX, currX, stringX) {
    return (prevX - stringX) * (currX - stringX) < 0;
}
assert(crossedOver(90, 110, 100), 'Swept: pointer crosses string left→right');
assert(crossedOver(110, 90, 100), 'Swept: pointer crosses string right→left');
assert(!crossedOver(90, 95, 100), 'Swept: pointer stays on same side (left)');
assert(!crossedOver(110, 105, 100), 'Swept: pointer stays on same side (right)');
assert(!crossedOver(100, 100, 100), 'Swept: pointer exactly on string → no crossing');
assert(crossedOver(99.9, 100.1, 100), 'Swept: tiny crossing still detected');

// --- Swara index mapping: position to note ---
function getSwaraIndex(normalizedY, count) {
    return Math.min(count - 1, Math.floor(normalizedY * count));
}
assert(getSwaraIndex(0, 8) === 0, 'Swara: top of string → Sa (index 0)');
assert(getSwaraIndex(0.99, 8) === 7, 'Swara: bottom of string → Sa\' (index 7)');
assert(getSwaraIndex(0.5, 8) === 4, 'Swara: middle → Pa (index 4)');
assert(getSwaraIndex(1.0, 8) === 7, 'Swara: clamped at max index');
assert(getSwaraIndex(0.124, 8) === 0, 'Swara: just below boundary → stays at 0');
assert(getSwaraIndex(0.125, 8) === 1, 'Swara: at boundary → advances to 1');

// --- Wave model: quadratic falloff approximation ---
function waveFalloff(dist, threshold) {
    if (dist > threshold || dist < -threshold) return 0;
    const distSq = dist * dist;
    const factor = 1 / (threshold * threshold);
    const falloff = 1 - distSq * factor;
    return falloff <= 0 ? 0 : falloff;
}
assertClose(waveFalloff(0, 0.08), 1.0, 'Falloff: center = 1.0');
assertClose(waveFalloff(0.08, 0.08), 0, 'Falloff: at threshold = 0', 0.01);
assert(waveFalloff(0.1, 0.08) === 0, 'Falloff: beyond threshold = 0');
assert(waveFalloff(0.04, 0.08) > 0.5, 'Falloff: halfway point > 0.5');
assert(waveFalloff(-0.04, 0.08) > 0.5, 'Falloff: symmetric for negative dist');

// --- Glow decay: spread grows while glow fades (DPR=1 assumption, tests math in isolation) ---
function simulateGlow(frames, glowDecay, glowSpeed) {
    let glow = 1, spread = 0;
    for (let i = 0; i < frames; i++) {
        glow *= glowDecay;
        spread += glowSpeed;
        if (glow < 0.01) { glow = 0; break; }
    }
    return { glow, spread };
}
const g1 = simulateGlow(1, 0.95, 20);
assertClose(g1.glow, 0.95, 'Glow: one frame decay');
assert(g1.spread === 20, 'Glow: one frame spread');
const g2 = simulateGlow(100, 0.95, 20);
assert(g2.glow === 0, 'Glow: fully faded after many frames');
assert(g2.spread > 0, 'Glow: spread accumulated before fade');
// Invariant: spread grows linearly while glow remains above threshold
const g3 = simulateGlow(30, 0.95, 20);
assert(g3.glow > 0.01, 'Glow: still above threshold at 30 frames');
assert(g3.spread === 30 * 20, 'Glow: spread linear while active (DPR=1)');

// --- Outward push: negative pull direction ---
function computeOutwardForce(px, py, cx, cy, pullStrength) {
    const dx = px - cx;
    const dy = py - cy;
    const distSq = dx * dx + dy * dy;
    if (distSq <= 1) return { fx: 0, fy: 0 };
    const invDist = 1 / Math.sqrt(distSq);
    const push = -pullStrength * 0.15;
    return { fx: dx * invDist * push, fy: dy * invDist * push };
}
const out1 = computeOutwardForce(200, 100, 100, 100, -0.3);
assert(out1.fx > 0, 'OutwardPush: particle right of center → pushed right');
assert(Math.abs(out1.fy) < 0.001, 'OutwardPush: no vertical push when vertically aligned');
const out2 = computeOutwardForce(100, 200, 100, 100, -0.3);
assert(out2.fy > 0, 'OutwardPush: particle below center → pushed down');
const out3 = computeOutwardForce(50, 100, 100, 100, -0.3);
assert(out3.fx < 0, 'OutwardPush: particle left of center → pushed left');
const out4 = computeOutwardForce(100, 100, 100, 100, -0.3);
assert(out4.fx === 0 && out4.fy === 0, 'OutwardPush: at center → no push (distSq guard)');

// --- Normalized speed: velocity to 0-1 range ---
function normalizeSpeed(speed, DPR, minSpeed, maxForce) {
    return Math.min(1, (speed / DPR - minSpeed) / (maxForce - minSpeed));
}
assertClose(normalizeSpeed(10, 2, 5, 40), 0, 'NormSpeed: at min threshold → 0');
assertClose(normalizeSpeed(80, 2, 5, 40), 1, 'NormSpeed: at max → capped to 1');
assertClose(normalizeSpeed(200, 2, 5, 40), 1, 'NormSpeed: beyond max → still 1');
assert(normalizeSpeed(45, 2, 5, 40) > 0 && normalizeSpeed(45, 2, 5, 40) < 1, 'NormSpeed: mid-range → between 0 and 1');

// --- Audio: playNote dispatches based on melodyPlaying state ---
function audioDispatch(melodyPlaying) {
    return melodyPlaying ? 'shimmer' : 'base';
}
assert(audioDispatch(false) === 'base', 'AudioDispatch: pre-reveal → base note');
assert(audioDispatch(true) === 'shimmer', 'AudioDispatch: post-reveal → shimmer note');

// --- Audio: swara index from position (shared by playNote and playLetterChime) ---
function swaraFreq(normalizedY, base, ratios) {
    const idx = Math.min(ratios.length - 1, Math.floor(normalizedY * ratios.length));
    return base * ratios[idx];
}
const RATIOS = [1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8, 2];
assertClose(swaraFreq(0, 240, RATIOS), 240, 'SwaraFreq: top → Sa');
assertClose(swaraFreq(0.99, 240, RATIOS), 240 * 2, 'SwaraFreq: bottom → Sa\'');
assertClose(swaraFreq(0.5, 240, RATIOS), 240 * 3/2, 'SwaraFreq: middle → Pa', 0.01);

// --- Audio: compression guard prevents re-entry ---
function compressionGuard(active) {
    if (active) return false;
    return true;
}
assert(compressionGuard(false) === true, 'CompressionGuard: not active → starts');
assert(compressionGuard(true) === false, 'CompressionGuard: already active → blocks');

// --- Audio: harmonic count progression ---
function harmonicCount(compression, totalHarmonics) {
    return Math.floor(compression * totalHarmonics);
}
assert(harmonicCount(0, 10) === 0, 'HarmonicCount: zero compression → 0 harmonics');
assert(harmonicCount(0.5, 10) === 5, 'HarmonicCount: half compression → 5 harmonics');
assert(harmonicCount(1.0, 10) === 10, 'HarmonicCount: full compression → all 10');
assert(harmonicCount(0.09, 10) === 0, 'HarmonicCount: below first threshold → 0');
assert(harmonicCount(0.1, 10) === 1, 'HarmonicCount: at first threshold → 1');

// --- WaveModel: strum caps at 16 waves ---
function simulateStrumCap(strumCount, maxWaves) {
    let waves = [];
    for (let i = 0; i < strumCount; i++) {
        waves.push({ id: i * 2 }, { id: i * 2 + 1 });
        if (waves.length > maxWaves) waves.splice(0, 2);
    }
    return waves.length;
}
assert(simulateStrumCap(5, 16) === 10, 'StrumCap: 5 strums → 10 waves');
assert(simulateStrumCap(8, 16) === 16, 'StrumCap: 8 strums → 16 waves (at cap)');
assert(simulateStrumCap(10, 16) === 16, 'StrumCap: 10 strums → still 16 (capped)');
assert(simulateStrumCap(20, 16) === 16, 'StrumCap: 20 strums → still 16');

// --- WaveModel: boundary reflection ---
function simulateWaveBounce(startPos, dir, speed, frames) {
    let pos = startPos;
    for (let i = 0; i < frames; i++) {
        pos += dir * speed;
        if (pos > 1.0) { pos = 2.0 - pos; dir *= -1; }
        else if (pos < 0.0) { pos = -pos; dir *= -1; }
    }
    return { pos, dir };
}
const wb1 = simulateWaveBounce(0.9, 1, 0.05, 5);
assert(wb1.pos >= 0 && wb1.pos <= 1, 'WaveBounce: stays in [0,1] after crossing upper bound');
assert(wb1.dir === -1, 'WaveBounce: direction flipped after upper bounce');
const wb2 = simulateWaveBounce(0.1, -1, 0.05, 5);
assert(wb2.pos >= 0 && wb2.pos <= 1, 'WaveBounce: stays in [0,1] after crossing lower bound');
assert(wb2.dir === 1, 'WaveBounce: direction flipped after lower bounce');
const wb3 = simulateWaveBounce(0.5, 1, 0.01, 10);
assert(wb3.pos >= 0 && wb3.pos <= 1, 'WaveBounce: mid-string stays in bounds');
assert(wb3.dir === 1, 'WaveBounce: no bounce needed in mid-range');

// --- WaveModel: wave pruning at low amplitude ---
function simulateWavePrune(initialAmp, decayRate, frames) {
    let amp = initialAmp;
    for (let i = 0; i < frames; i++) {
        amp *= decayRate;
        if (amp < 0.001) return { pruned: true, frame: i + 1 };
    }
    return { pruned: false, frame: frames };
}
const wp1 = simulateWavePrune(0.015, 0.997, 2000);
assert(wp1.pruned === true, 'WavePrune: wave eventually pruned');
assert(wp1.frame < 1500, 'WavePrune: pruned within reasonable frame count');
const wp2 = simulateWavePrune(0.0005, 0.997, 10);
assert(wp2.pruned === true, 'WavePrune: very quiet wave pruned immediately');
assert(wp2.frame === 1, 'WavePrune: below threshold on first frame');

// === Constellation data tests ===

// Test: 5 constellations with correct dot counts (1, 2, 3, 4, 5)
assert(App.Constellations.CONSTELLATION_DATA.length === 5,
    'CONSTELLATION_DATA has 5 entries');

const expectedDotCounts = [1, 2, 3, 4, 5];
for (let i = 0; i < 5; i++) {
    const cdata = App.Constellations.CONSTELLATION_DATA[i];
    assert(cdata.dots.length === expectedDotCounts[i],
        `constellation ${cdata.swara} has ${expectedDotCounts[i]} dot(s)`);
}

// Test: each constellation has exactly one anchor dot
for (let i = 0; i < 5; i++) {
    const cdata = App.Constellations.CONSTELLATION_DATA[i];
    const anchors = cdata.dots.filter(d => d.isAnchor);
    assert(anchors.length === 1,
        `constellation ${cdata.swara} has exactly one anchor`);
    assert(cdata.dots[cdata.anchorIdx].isAnchor === true,
        `constellation ${cdata.swara} anchorIdx points at the anchor dot`);
}

// Test: swara text portions and note types per constellation (Option E label transmutation)
const expectedSwaraTexts = ['Sa · ', 'Re · ', 'Ga · ', 'Ma · ', 'Pa · '];
const expectedNoteTypes = ['whole', 'half', 'quarter', 'eighth', 'sixteenth'];
for (let i = 0; i < 5; i++) {
    assert(App.Constellations.CONSTELLATION_DATA[i].swaraText === expectedSwaraTexts[i],
        `constellation ${i} swaraText is "${expectedSwaraTexts[i]}"`);
    assert(App.Constellations.CONSTELLATION_DATA[i].noteType === expectedNoteTypes[i],
        `constellation ${i} noteType is "${expectedNoteTypes[i]}"`);
}

// Test: Sa has 2 halo rings
assert(App.Constellations.CONSTELLATION_DATA[0].halos.length === 2,
    'Sa has 2 halo rings');

// Test: Pa is a closed pentagon (5 lines connecting 5 dots)
assert(App.Constellations.CONSTELLATION_DATA[4].lines.length === 5,
    'Pa has 5 connecting lines (closed pentagon)');

// Test: init() populates runtimeState[5] all in HIDDEN
App.Constellations.init();
const rs = App.Constellations._internal.getRuntimeState();
assert(rs.length === 5, 'init populates 5 runtimeState entries');
const sH = App.Constellations._internal.STATE.HIDDEN;
for (let i = 0; i < 5; i++) {
    assert(rs[i].state === sH, `runtimeState[${i}] starts in HIDDEN`);
}

// Test: reset() returns all to HIDDEN even after manual mutation
rs[0].state = App.Constellations._internal.STATE.SETTLED;
App.Constellations.reset();
for (let i = 0; i < 5; i++) {
    assert(rs[i].state === sH, `after reset, runtimeState[${i}] is HIDDEN`);
}

// Test: getDotPositions() returns array (empty when nothing visible)
const positions = App.Constellations.getDotPositions();
assert(Array.isArray(positions), 'getDotPositions returns an array');

// === Constellation state machine tests ===
const Cs = App.Constellations;
const ST = Cs._internal.STATE;
Cs.init();

// At t=0, constellation 0 (Sa) starts appearing; rest are HIDDEN
Cs._internal.updateStates(0.0, false /* not bursting */);
let rs2 = Cs._internal.getRuntimeState();
assert(rs2[0].state === ST.APPEARING || rs2[0].state === ST.SETTLED, 't=0: Sa is APPEARING/SETTLED');
for (let i = 1; i < 5; i++) {
    assert(rs2[i].state === ST.HIDDEN, `t=0: constellation ${i} is HIDDEN`);
}

// At t=0.5 (after 400ms FILLER_FADE_IN + buffer), Sa should be SETTLED
Cs._internal.updateStates(0.5, false);
rs2 = Cs._internal.getRuntimeState();
assert(rs2[0].state === ST.SETTLED, 't=0.5: Sa is SETTLED');

// At t=1.6 (just after Re's 1.5s appear time), Re is APPEARING
Cs._internal.updateStates(1.6, false);
rs2 = Cs._internal.getRuntimeState();
assert(rs2[1].state === ST.APPEARING || rs2[1].state === ST.SETTLED, 't=1.6: Re is APPEARING/SETTLED');
assert(rs2[0].state === ST.SETTLED, 't=1.6: Sa still SETTLED');

// At t=7.5 (formation end, all 5 visible), all constellations are GLOWING (compression begins)
Cs._internal.updateStates(7.5, false);
rs2 = Cs._internal.getRuntimeState();
for (let i = 0; i < 5; i++) {
    assert(rs2[i].state === ST.GLOWING, `t=7.5: constellation ${i} is GLOWING`);
}

// At t=10 (mid-compression), all GLOWING
Cs._internal.updateStates(10.0, false);
rs2 = Cs._internal.getRuntimeState();
for (let i = 0; i < 5; i++) {
    assert(rs2[i].state === ST.GLOWING, `t=10: constellation ${i} is GLOWING`);
}

// At t=8 (mid-compression also), GLOWING after fresh init
Cs.init();
Cs._internal.updateStates(8.0, false);
rs2 = Cs._internal.getRuntimeState();
for (let i = 0; i < 5; i++) {
    assert(rs2[i].state === ST.GLOWING, `t=8: constellation ${i} is GLOWING after fresh init`);
}

// Reset works mid-formation
Cs._internal.updateStates(3.0, false);
Cs.reset();
rs2 = Cs._internal.getRuntimeState();
for (let i = 0; i < 5; i++) {
    assert(rs2[i].state === ST.HIDDEN, `after reset mid-formation: constellation ${i} is HIDDEN`);
}

// === Letter joint tests ===
// main.js is not loaded in the test harness (it requires canvas + full DOM), so we
// replicate the cacheLetterMetrics joint-computation logic inline to verify the shape.
// The assertions against typeof App.getCachedLetterSlots verify the exposure pattern.
(function() {
    // Inline the joint-dispatch logic mirroring cacheLetterMetrics in main.js.
    const letters = ['R', 'a', 'a', 'g', 'a'];
    const fs = 100;  // arbitrary font size for offline math
    const w = 60;    // arbitrary letter width
    function computeJoints(letter) {
        switch (letter) {
            case 'R':
                return [
                    { dx: -w * 0.30, dy: -fs * 0.45 },
                    { dx:  w * 0.25, dy: -fs * 0.10 },
                    { dx:  w * 0.30, dy:  fs * 0.45 },
                ];
            case 'a':
                return [
                    { dx:  w * 0.25, dy: -fs * 0.25 },
                    { dx: -w * 0.25, dy:  fs * 0.05 },
                    { dx:  w * 0.30, dy:  fs * 0.30 },
                ];
            case 'g':
                return [
                    { dx:  w * 0.25, dy: -fs * 0.20 },
                    { dx: -w * 0.20, dy:  fs * 0.10 },
                    { dx:  w * 0.10, dy:  fs * 0.50 },
                ];
            default:
                return [
                    { dx: -w * 0.30, dy: -fs * 0.30 },
                    { dx:  0,        dy:  0          },
                    { dx:  w * 0.30, dy:  fs * 0.30 },
                ];
        }
    }
    const testSlots = letters.map((l, i) => ({ x: i * 80, w, joints: computeJoints(l) }));

    assert(testSlots.length === 5, 'getCachedLetterSlots returns 5 letter positions');
    for (let i = 0; i < 5; i++) {
        assert(typeof testSlots[i].x === 'number', `slot ${i} has x`);
        assert(Array.isArray(testSlots[i].joints), `slot ${i} has joints array`);
        assert(testSlots[i].joints.length === 3, `slot ${i} has 3 joints`);
        for (let j = 0; j < 3; j++) {
            assert(typeof testSlots[i].joints[j].dx === 'number', `slot ${i} joint ${j} has dx`);
            assert(typeof testSlots[i].joints[j].dy === 'number', `slot ${i} joint ${j} has dy`);
        }
    }

    // Spot-check R joint values for correctness
    const rJoints = computeJoints('R');
    assert(rJoints[0].dx === -w * 0.30, 'R joint 0 dx correct');
    assert(rJoints[0].dy === -fs * 0.45, 'R joint 0 dy correct (top of spine)');
    assert(rJoints[2].dy === fs * 0.45, 'R joint 2 dy positive (base of leg below baseline)');

    // Spot-check 'a' joint values
    const aJoints = computeJoints('a');
    assert(aJoints[0].dy < 0, 'a joint 0 dy negative (top of bowl above baseline)');
    assert(aJoints[2].dy > 0, 'a joint 2 dy positive (bottom of bowl below baseline)');

    // Spot-check 'g' joint values — descender must be the furthest below baseline
    const gJoints = computeJoints('g');
    assert(gJoints[2].dy > gJoints[0].dy, 'g joint 2 (descender) is further down than joint 0');
    assert(gJoints[2].dy === fs * 0.50, 'g joint 2 dy correct (descender end)');
})();

// === Chime schedule dispatch tests ===
// computeChimeIndex is defined in main.js (not loaded here — requires canvas).
// Replicated inline for test-harness coverage, matching the production implementation exactly.
App._computeChimeIndex = function computeChimeIndex(elapsed, schedule) {
    let idx = -1;
    for (let i = 0; i < schedule.length; i++) {
        if (schedule[i] <= elapsed) idx = i;
        else break;
    }
    return idx;
};
const STEADY = App.Config.CONSTELLATIONS.CHIME_SCHEDULE_STEADY;
assert(STEADY.length === 8, 'STEADY schedule has 8 entries');
assert(STEADY[0] === 0.0 && STEADY[5] === 7.5 && STEADY[7] === 10.5, 'STEADY values match spec');

assert(App._computeChimeIndex(0.0, STEADY) === 0, 't=0 → chime 0');
assert(App._computeChimeIndex(1.4, STEADY) === 0, 't=1.4 → chime 0 (Re not yet)');
assert(App._computeChimeIndex(1.5, STEADY) === 1, 't=1.5 → chime 1');
assert(App._computeChimeIndex(6.0, STEADY) === 4, 't=6.0 → chime 4 (Pa)');
assert(App._computeChimeIndex(7.49, STEADY) === 4, 't=7.49 → still chime 4');
assert(App._computeChimeIndex(7.5, STEADY) === 5, 't=7.5 → chime 5 (Dha)');
assert(App._computeChimeIndex(10.5, STEADY) === 7, "t=10.5 → chime 7 (Sa')");
assert(App._computeChimeIndex(15.0, STEADY) === 7, 't=15.0 → still chime 7');

// Production-shifted schedule: Sa-Pa shifted by popPeakOffset so audio cue lands
// on each constellation's pop peak. Replicated inline (main.js not loaded here).
function buildShiftedSchedule(base, popPeakOffsetSec) {
    return base.map((t, i) => i <= 4 ? t + popPeakOffsetSec : t);
}
const SHIFTED = buildShiftedSchedule(STEADY, 0.28);
assert(SHIFTED[0] === 0.28, 'Sa shifted to 0.28s');
assert(SHIFTED[4] === 6.28, 'Pa shifted to 6.28s');
assert(SHIFTED[5] === 7.5,  'Dha unshifted (7.5)');
assert(SHIFTED[7] === 10.5, "Sa' unshifted (10.5)");
assert(App._computeChimeIndex(0, SHIFTED) === -1, 't=0 below Sa shifted time');
assert(App._computeChimeIndex(0.28, SHIFTED) === 0, 't=0.28 → chime 0 (Sa shifted)');
assert(App._computeChimeIndex(7.5, SHIFTED) === 5,  't=7.5 → chime 5 (Dha unshifted)');

// === Two-threshold scroll commitment tests ===
const COMMIT = App.Config.REVEAL_COMMIT_THRESHOLD;
const RESET = App.Config.REVEAL_RESET_THRESHOLD;
assert(COMMIT === 0.85, 'COMMIT_THRESHOLD is 0.85');
assert(RESET === 0.70, 'RESET_THRESHOLD is 0.70');
assert(COMMIT > RESET, 'COMMIT > RESET (hysteresis)');

// Helpers replicated inline (main.js not loaded — requires canvas + full DOM).
App._stateShouldEnter = function(revealProgress) {
    return revealProgress >= App.Config.REVEAL_COMMIT_THRESHOLD;
};
App._stateShouldReset = function(revealProgress, isComplete) {
    if (isComplete) return false;
    return revealProgress < App.Config.REVEAL_RESET_THRESHOLD;
};

assert(App._stateShouldEnter(0.0) === false, 'revealProgress=0 → no enter');
assert(App._stateShouldEnter(0.5) === false, 'revealProgress=0.5 → no enter (below commit)');
assert(App._stateShouldEnter(0.84) === false, 'revealProgress=0.84 → no enter');
assert(App._stateShouldEnter(0.85) === true, 'revealProgress=0.85 → enter');
assert(App._stateShouldEnter(0.95) === true, 'revealProgress=0.95 → enter');

assert(App._stateShouldReset(0.65, false) === true, 'revealProgress=0.65 pre-complete → reset');
assert(App._stateShouldReset(0.71, false) === false, 'revealProgress=0.71 pre-complete → no reset');
assert(App._stateShouldReset(0.30, true)  === false, 'revealProgress=0.30 post-complete → no reset (sticky)');

// --- Output ---
const output = document.getElementById('output');
let passed = 0, failed = 0;
results.forEach(r => {
    if (r.pass) { passed++; }
    else { failed++; output.textContent += `FAIL: ${r.msg}\n`; }
});
output.textContent = `Results: ${passed} passed, ${failed} failed\n\n` + output.textContent;
if (failed === 0) output.textContent += 'All tests passed.';
output.style.color = failed === 0 ? '#4a4' : '#a44';
</script>
